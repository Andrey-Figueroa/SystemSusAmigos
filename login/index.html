<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="../LOGO SUS AMIGOS.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | NeuraLoom Auto</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <div class="login-wrapper">
        <div class="login-container">
            <!-- Header Brand -->
            <div class="login-header">
                <div class="brand-logo">
                    <i class="fa-solid fa-gears spin-slow"></i>
                </div>
                <h1>NeuraLoom Auto</h1>
                <p>Centro de Servicios Automotrices</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                        <i class="fa-solid fa-eye-slash toggle-password" id="toggle-password"></i>
                    </div>
                </div>

                <div class="form-actions">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Recordarme</label>
                    </div>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login" id="btn-login">
                    <span>Ingresar</span>
                    <i class="fa-solid fa-arrow-right button-icon"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 NeuraLoom Auto. Todos los derechos reservados.</p>
            </div>
        </div>
    </div>

    <!-- Supabase SDK via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase Client Configuration -->
    <script src="../js/supabase.js"></script>
    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
